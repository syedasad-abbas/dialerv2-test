server {
  listen 8088;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri /index.html;
  }

  # Proxy browser SIP websocket traffic to FreeSWITCH WS listener in the same pod network namespace.
  location /sip-ws {
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_pass http://172.19.0.2:5066;
  }
}
